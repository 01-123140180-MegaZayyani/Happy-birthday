<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#7afcff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    animation:fade 1.5s;
}

h1{
    color:#ff4081;
    font-size:45px;
}

p{
    margin:20px 0;
    color:#555;
    font-size:18px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff4081;
    color:white;
    cursor:pointer;
    font-size:17px;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff1f6b;
}

#message{
  margin-top:20px;
    font-size:20px;
    color:#e91e63;
    font-weight:bold;
}

.balloon{
    position:absolute;
    bottom:-120px;
    width:40px;
    height:55px;
    border-radius:50%;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
      }
}
</style>
</head>

<body>

<div class="card">
    <h1>🎂 Happy Birthday 🎂</h1>
    <p>Semoga panjang umur, sehat selalu,<br>dan semua impianmu segera tercapai. ✨</p>

    <button onclick="showWish()">Klik Hadiahnya 🎁</button>

    <div id="message"></div>
</div>

<script>

function showWish(){
    document.getElementById("message").innerHTML =
      "🎉 Selamat Ulang Tahun! Semoga hari ini menjadi awal dari tahun yang penuh kebahagiaan, kesehatan, rezeki, dan kesuksesan. ❤️";
}

const colors=["#ff4d6d","#ffd60a","#38bdf8","#7b2cbf","#80ed99"];

for(let i=0;i<25;i++){

    let balloon=document.createElement("div");
    balloon.className="balloon";

    balloon.style.left=Math.random()*100+"vw";
    balloon.style.background=colors[Math.floor(Math.random()*colors.length)];
  balloon.style.animationDuration=(6+Math.random()*5)+"s";
    balloon.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(balloon);
}

</script>

</body>
</html>
